<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Thighito - Site | Membro de Iceveil Studios.</title>
        <link rel="icon" type="image/png" href="logo-th.png"/>
    </head>
    <style>


        body{
            background:#000;
            color:#fff;
            position:relative;
            overflow-x:hidden;
            }

        body::before{
            content:"";
            position:fixed;
            inset:0;
            background:url("https://www.iceveil.com.br/assets/noise.png") repeat;
            opacity:.08;
            pointer-events:none;
            z-index:-1;
            }
        .h1 {
            color: #ffffff;
        }
        .p {
            color: #ffffff;
        }
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #000000;
            color: #ffffff;
            text-align: center;
            padding: 10px;
        }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 9998;
        }
        .side-menu {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            padding: 20px;
            transition: left 0.3s ease-in-out;
            z-index: 9999;
        }
        .side-menu a {
            display: block;
            color: #ffffff;
            text-decoration: none;
            margin-bottom: 10px;
        }
        .side-menu a:hover {
            text-decoration: underline;
        }
        .side-menu.open {
            left: 0;
        }

    </style>
    <body>
    
    <div class="menu-overlay" id="menuOverlay"></div>

    <nav id="sideMenu" class="side-menu" aria-label="Menu lateral">
        <a href="#top">Início</a>
        <a href="#sobre">Sobre</a>
        <a href="#contato">Contato</a>
    </nav>

    <div class="loader" id="loader">
    <h1>Carregando...</h1>
    </div>

    <div id="content" style="display: none;">
        <h1>Bem-vindo ao Thighito</h1>
        <p>Este é o site oficial do Thighito, membro de Iceveil Studios.</p>
        <p>Explore o conteúdo e descubra mais sobre nossos projetos.</p>
    </div>

    </body>
<script>
    window.addEventListener('load', function() {
        const loader = document.getElementById('loader');
        const content = document.getElementById('content');
        loader.style.display = 'none';
        content.style.display = 'block';
    });

    const menuOverlay = document.getElementById('menuOverlay');
    const sideMenu = document.getElementById('sideMenu');

    function toggleMenu() {
        sideMenu.classList.toggle('open');
        menuOverlay.style.display = sideMenu.classList.contains('open') ? 'block' : 'none';
    }

    menuOverlay.addEventListener('click', toggleMenu);
</script>  
</html>
